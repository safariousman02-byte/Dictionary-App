
<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Dictionary App</title>
    </head>

    <body>

        <div class="container">

            <h1>Dictionary</h1>

            <div class="search-box">

                <input type="text" id="wordInput" placeholder="Type a word Ex: 'Happy'">
                <button id="searchBtn">Search</button>

            </div>

            <div id="result">

                <p id="status">Enter a word and click search</p>

            </div>

            <div id="history">

                <h3>Recent Researches</h3>
                <ul id="histpryList"></ul>

            </div>

        </div>


        
    </body>

</html>
